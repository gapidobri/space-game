name: space_game
description: "Space game written in Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  gamengine:
    path: packages/gamengine
  cupertino_icons: ^1.0.8
  collection: ^1.19.1
  go_router: ^17.2.0
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/rocket/
    - assets/planets/
    - assets/background/
    - assets/portals/

  fonts:
    - family: Doto
      fonts:
        - asset: assets/fonts/Doto.ttf